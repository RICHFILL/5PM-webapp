<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <circle cx="20" cy="20" r="16" stroke="#e5e7eb" strokeWidth="4" fill="none"/>
  <circle cx="20" cy="20" r="16" stroke="url(#lg)" strokeWidth="4" strokeLinecap="round" fill="none" strokeDasharray="80" strokeDashoffset="60">
    <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="1s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stopColor="#52c7e4"/>
      <stop offset="100%" stopColor="#6255a4"/>
    </linearGradient>
  </defs>
</svg>
